<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="50%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#020408" />
    </linearGradient>

    <!-- Glowing Blue/Cyan Gradient for Vectors -->
    <linearGradient id="vectorGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Glowing Magenta/Purple Gradient for Target -->
    <linearGradient id="vectorGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#7928ca" />
    </linearGradient>

    <!-- Grid pattern for technical aesthetic -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Animations for Dynamic Aspect */
    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 0.7; }
      100% { opacity: 0.3; }
    }
    @keyframes steer {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    @keyframes textGlow {
      0% { text-shadow: 0 0 10px rgba(0,242,254,0.3); }
      50% { text-shadow: 0 0 20px rgba(0,242,254,0.8); }
      100% { text-shadow: 0 0 10px rgba(0,242,254,0.3); }
    }
    .grid-bg {
      animation: pulse 6s ease-in-out infinite;
    }
    .steering-line {
      stroke-dasharray: 20, 10;
      animation: steer 30s linear infinite;
    }
    .interactive-node {
      animation: float 4s ease-in-out infinite;
    }
    .title-text {
      font-family: 'Outfit', 'Inter', system-ui, sans-serif;
      font-weight: 800;
      fill: #ffffff;
      animation: textGlow 3s ease-in-out infinite;
    }
    .subtitle-text {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 500;
      fill: #a0aec0;
      letter-spacing: 0.15em;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#grid)" class="grid-bg" />

  <!-- Animated Latent Space Waves -->
  <path d="M-100 200 C 200 350, 400 50, 700 250 C 900 350, 1000 150, 1300 200" fill="none" stroke="rgba(0, 242, 258, 0.08)" stroke-width="4" />
  <path d="M-100 250 C 300 150, 500 300, 800 100 C 1000 50, 1100 250, 1300 220" fill="none" stroke="rgba(255, 0, 127, 0.05)" stroke-width="3" />

  <!-- Steering Vector Visual Representation -->
  <g filter="url(#glow)">
    <!-- Base Vector (Shifted) -->
    <line x1="150" y1="300" x2="450" y2="120" stroke="url(#vectorGrad1)" stroke-width="3" stroke-linecap="round" class="steering-line" />
    <circle cx="150" cy="300" r="6" fill="#00f2fe" />
    
    <!-- Shifted Steering Influence Vector -->
    <line x1="450" y1="120" x2="850" y2="280" stroke="url(#vectorGrad2)" stroke-width="4" stroke-linecap="round" class="steering-line" />
    
    <!-- Target Activation Node -->
    <g class="interactive-node">
      <circle cx="850" cy="280" r="15" fill="none" stroke="#ff007f" stroke-width="2" />
      <circle cx="850" cy="280" r="8" fill="#ff007f" filter="url(#glow-heavy)" />
      <!-- Target Aim Coordinates -->
      <path d="M830 280 H870 M850 260 V300" stroke="rgba(255, 0, 127, 0.4)" stroke-width="1.5" />
    </g>
  </g>

  <!-- Typography -->
  <g transform="translate(100, 180)">
    <!-- Main Title -->
    <text class="title-text" font-size="52" x="0" y="0">AWESOME STEERING VECTORS</text>
    <!-- Subtitle -->
    <text class="subtitle-text" font-size="14" x="2" y="38">RUNTIME ALIGNMENT &amp; CONCEPT MANIPULATION</text>
  </g>
</svg>
